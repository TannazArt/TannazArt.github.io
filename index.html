<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tannaz - Digital Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700&family=Orbitron:wght=400;700;900&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-color: #7c3aed;
      --secondary-color: #06b6d4;
      /* Theme overrides for the chat window */
      --n8n-chat-primary-color: #7c3aed;
      --n8n-chat-background-color: #0b1329;
      --n8n-chat-text-color: #ffffff;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020818;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      gap: 20px;
    }

    /* ── Hide the default n8n floating launcher button ── */
    .n8n-chat-widget .n8n-chat-button {
      display: none !important;
    }

    /* ── Color Customizer Panel ── */
    .color-panel {
      z-index: 20;
      display: flex;
      gap: 15px;
      align-items: center;
      padding: 10px 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 10px;
    }

    .color-panel label {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-panel input[type="color"] {
      -webkit-appearance: none;
      border: none;
      width: 24px; height: 24px;
      border-radius: 50%;
      cursor: pointer;
      background: none;
    }

    .color-panel input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-panel input[type="color"]::-webkit-color-swatch {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
    }

    /* ── Animated background ── */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .55;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .bg-orb:nth-child(1) {
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--primary-color), #4f46e5);
      top: -120px; left: -100px; animation-delay: 0s;
    }

    .bg-orb:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--secondary-color), #0ea5e9);
      bottom: -80px; right: -80px; animation-delay: -4s;
    }

    .bg-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #f0abfc, var(--primary-color));
      top: 50%; left: 60%; animation-delay: -8s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.12); }
    }

    /* ── Grid overlay ── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(99, 102, 241, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, .08) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Particle canvas ── */
    canvas {
      position: fixed; inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Scene ── */
    .scene {
      perspective: 1000px;
      z-index: 10;
      position: relative;
    }

    /* ── Card ── */
    .card {
      width: 460px;
      height: 270px;
      border-radius: 24px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .08s linear;
      cursor: pointer;
    }

    /* Glass face */
    .card-inner {
      position: absolute; inset: 0;
      border-radius: 24px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, .18) 0%,
        rgba(255, 255, 255, .06) 60%,
        rgba(120, 80, 255, .10) 100%
      );
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, .22);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, .45),
        0 0 0 .5px rgba(255, 255, 255, .12) inset,
        0 1px 0 rgba(255, 255, 255, .35) inset;
      overflow: hidden;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Shine sweep */
    .card-inner::before {
      content: '';
      position: absolute;
      top: -60%; left: -60%;
      width: 60%; height: 160%;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, .15) 50%, transparent 60%);
      transform: skewX(-15deg);
      animation: shine 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0%   { left: -60%; opacity: 0; }
      10%  { opacity: 1; }
      40%  { left: 130%; opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }

    /* Holographic edge glow */
    .card-inner::after {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 24px;
      background: conic-gradient(
        from var(--angle, 0deg),
        var(--primary-color), var(--secondary-color), #a855f7, #4f46e5, var(--primary-color)
      );
      z-index: -1; opacity: 0;
      transition: opacity .4s;
      animation: spin 4s linear infinite;
    }

    .card:hover .card-inner::after { opacity: 1; }

    @keyframes spin { to { --angle: 360deg; } }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    /* ── Card top ── */
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .logo-mark {
      width: 46px; height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900; font-size: 18px;
      color: #fff; letter-spacing: -1px;
      box-shadow: 0 0 18px rgba(124, 58, 237, .4), 0 0 6px rgba(6, 182, 212, .3);
      flex-shrink: 0;
    }

    .card-tag {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 400;
      letter-spacing: 3px;
      color: rgba(165, 214, 255, .6);
      text-transform: uppercase;
      text-align: right; line-height: 1.6;
    }

    .card-tag span { display: block; color: #7dd3fc; }

    /* ── Name block ── */
    .name-block { margin-top: 4px; }

    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px; font-weight: 700;
      color: #fff; letter-spacing: .5px;
      text-shadow: 0 0 20px rgba(124, 58, 237, .5);
    }

    .title {
      font-size: 12px; font-weight: 400;
      color: rgba(200, 220, 255, .65);
      letter-spacing: 1.5px;
      text-transform: uppercase; margin-top: 6px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120, 180, 255, .3), transparent);
      margin: 0 -34px;
    }

    /* ── Bottom Section ── */
    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    /* ── Left dynamic note or bio space ── */
    .card-note {
      font-size: 11px;
      color: rgba(200, 230, 255, .5);
      letter-spacing: .5px;
      font-style: italic;
    }

    /* ── Right side of bottom ── */
    .card-bottom-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      margin-left: auto;
    }

    /* ── NFC chip ── */
    .nfc-chip {
      width: 38px; height: 28px;
      border-radius: 6px;
      border: 1.5px solid rgba(255, 255, 255, .2);
      background: linear-gradient(135deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .04));
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 3px; padding: 4px;
      box-shadow: 0 0 10px rgba(6, 182, 212, .2);
    }

    .nfc-cell { border-radius: 2px; background: rgba(6, 182, 212, .35); }

    /* ── Custom Voice/Chat Button ── */
    .voice-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .25);
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(
        135deg,
        rgba(124, 58, 237, .45) 0%,
        rgba(6, 182, 212, .30) 100%
      );
      box-shadow:
        0 0 14px rgba(124, 58, 237, .5),
        0 0 28px rgba(6, 182, 212, .2),
        0 2px 8px rgba(0, 0, 0, .35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      z-index: 2;
      white-space: nowrap;
      transition: box-shadow .25s ease, border-color .25s ease, transform .15s ease;
    }

    .voice-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255, 255, 255, .18) 50%,
        transparent 70%
      );
      transform: translateX(-100%) skewX(-15deg);
      transition: transform .5s ease;
      pointer-events: none;
    }

    .voice-btn:hover::before  { transform: translateX(200%) skewX(-15deg); }

    .voice-btn:hover {
      box-shadow:
        0 0 22px rgba(124, 58, 237, .75),
        0 0 42px rgba(6, 182, 212, .35),
        0 4px 14px rgba(0, 0, 0, .45);
      border-color: rgba(255, 255, 255, .45);
      transform: translateY(-1px) scale(1.03);
    }

    .voice-btn:active { transform: translateY(0) scale(.98); }

    .voice-btn-icon {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .15);
      border: 1px solid rgba(255, 255, 255, .3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(124, 58, 237, .6);
    }

    .voice-btn-icon svg { width: 11px; height: 11px; fill: #fff; }

    .voice-btn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80, 0 0 12px #4ade80;
      animation: pulse-dot 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.5); opacity: .6; }
    }

    .n8n-chat-widget {
      font-family: 'Inter', sans-serif !important;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { width: 340px; height: auto; min-height: 260px; }
      .name  { font-size: 20px; }
      .card-inner { padding: 20px 22px; }
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="grid-overlay"></div>
<canvas id="particles"></canvas>

<div class="color-panel">
  <label>Primary:   <input type="color" id="primaryPicker"   value="#7c3aed"></label>
  <label>Secondary: <input type="color" id="secondaryPicker" value="#06b6d4"></label>
</div>

<div class="scene">
  <div class="card" id="card">
    <div class="card-inner">

      <div class="card-top">
        <div class="logo-mark">TA</div>
        <div class="card-tag">
          Est. 2026
          <span>Portfolio Edition</span>
          ID #0081
        </div>
      </div>

      <div class="name-block">
        <div class="name">Tannaz</div>
        <div class="title">Artist</div>
      </div>

      <div class="divider"></div>

      <div class="card-bottom">
        
        <div class="card-note">
          Creative Portfolio Card
        </div>

        <div class="card-bottom-right">

          <div class="nfc-chip">
            <div class="nfc-cell"></div>
            <div class="nfc-cell"></div>
            <div class="nfc-cell"></div>
            <div class="nfc-cell"></div>
          </div>

          <button class="voice-btn" id="voiceBtn" type="button">
            <span class="voice-btn-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
              </svg>
            </span>
            Talk to AI
            <span class="voice-btn-dot"></span>
          </button>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  /* ── Interactive Color Syncer ── */
  document.getElementById('primaryPicker').addEventListener('input', e => {
    document.documentElement.style.setProperty('--primary-color', e.target.value);
    document.documentElement.style.setProperty('--n8n-chat-primary-color', e.target.value);
  });
  document.getElementById('secondaryPicker').addEventListener('input', e =>
    document.documentElement.style.setProperty('--secondary-color', e.target.value));

  /* ── 3-D Dynamics Tilt Engine ── */
  const card  = document.getElementById('card');
  const scene = card.parentElement;

  scene.addEventListener('mousemove', e => {
    const r  = scene.getBoundingClientRect();
    const dx = (e.clientX - (r.left + r.width  / 2)) / (r.width  / 2);
    const dy = (e.clientY - (r.top  + r.height / 2)) / (r.height / 2);
    card.style.transform = `rotateX(${-dy * 12}deg) rotateY(${dx * 18}deg) scale(1.04)`;
  });

  scene.addEventListener('mouseleave', () => {
    card.style.transition = 'transform .6s cubic-bezier(.23,1,.32,1)';
    card.style.transform  = 'rotateX(0) rotateY(0) scale(1)';
    setTimeout(() => card.style.transition = 'transform .08s linear', 620);
  });

  /* ── Background Particle System ── */
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      this.x       = Math.random() * W;
      this.y       = init ? Math.random() * H : H + 10;
      this.r       = Math.random() * 1.6 + .4;
      this.vx      = (Math.random() - .5) * .3;
      this.vy      = -(Math.random() * .5 + .2);
      this.alpha   = Math.random() * .7 + .3;
      this.life    = 0;
      this.maxLife = 180 + Math.random() * 180;
    }
    update() {
      this.x += this.vx; this.y += this.vy; this.life++;
      if (this.life > this.maxLife || this.y < -10) this.reset(false);
    }
    draw() {
      const fade  = Math.min(this.life / 30, 1) * Math.min((this.maxLife - this.life) / 30, 1);
      const style = getComputedStyle(document.documentElement);
      ctx.globalAlpha = this.alpha * fade;
      ctx.fillStyle   = this.life % 2 === 0
        ? style.getPropertyValue('--primary-color').trim()
        : style.getPropertyValue('--secondary-color').trim();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (let i = 0; i < 90; i++) particles.push(new Particle());

  (function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  })();
</script>

<script type="module">
  import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
  
  // Placeholder cloud link left intact for future configuration
  createChat({
    webhookUrl: 'https://helio.app.n8n.cloud/webhook/18dc4dd1-84f4-420a-9e5a-9f941e3064bf/chat',
    initialMessages: ['Hi! I can answer questions about Tannaz. How can I help you today?'],
    i18n: {
      en: {
        title: 'Chat with Assistant',
        subtitle: 'Ask me anything about Tannaz',
        footer: '',
        getStarted: 'Start Chatting',
        inputPlaceholder: 'Type your question here...'
      }
    }
  });

  // Action event routing: link button directly to the pop-up panel
  document.getElementById('voiceBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    
    // Dynamically grab the hidden internal layout trigger button generated by n8n
    const internalN8nLauncher = document.querySelector('.n8n-chat-widget .n8n-chat-button, .n8n-chat-button');
    if (internalN8nLauncher) {
      internalN8nLauncher.click();
    } else {
      // Direct widget toggle fallback
      const directWidgetFrame = document.querySelector('.n8n-chat-widget');
      if (directWidgetFrame) directWidgetFrame.classList.toggle('n8n-chat-widget-closed');
    }
  });
</script>
</body>
</html>
